networks:
  clickhouse_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.10.0.0/16

services:
  clickhouse:
    image: "ccr.ccs.tencentyun.com/jxwaf/clickhouse-server:22.8.5-alpine"
    ports:
      - "9000:9000"
      - "9004:9004"
    environment:
      CLICKHOUSE_DB: jxwaf
      CLICKHOUSE_USER: jxlog
      CLICKHOUSE_PASSWORD: jxlog
      TZ: Asia/Shanghai
    volumes:
      - /opt/jxwaf_data/clickhouse:/var/lib/clickhouse
    restart: unless-stopped
    networks:
      clickhouse_network:
        ipv4_address: 172.10.0.10

  jxlog:
    container_name: jxlog
    image: "ccr.ccs.tencentyun.com/jxwaf/jxlog_professional:1.1"
    ports:
      - "8877:8877"
    environment:
      CLICKHOUSE: 172.10.0.10:9000
      DATABASE: jxwaf
      USERNAME: jxlog
      PASSWORD: jxlog
      TABLE: jxlog
      TCPSERVER: 0.0.0.0
      TCPPORT: 8877
      BATCH_SIZE: 1000
      BATCH_WAIT_TIMEOUT: 3
      TTL_DAYS: 30
      ENGINE: MergeTree
      TIMEZONE: Asia/Shanghai
    depends_on:
      - clickhouse
    restart: unless-stopped
    networks:
      clickhouse_network:
        ipv4_address: 172.10.0.11
